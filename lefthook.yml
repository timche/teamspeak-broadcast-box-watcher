# https://lefthook.dev
# Runs oxfmt + oxlint on staged files only, restaging whatever they fix.
pre-commit:
  parallel: false # format before lint to avoid re-format churn
  jobs:
    - name: format
      glob: "*.{ts,js,json,md,yml,yaml}"
      run: bunx oxfmt {staged_files}
      stage_fixed: true
    - name: lint
      glob: "*.{ts,js}"
      run: bunx oxlint --fix {staged_files}
      stage_fixed: true
